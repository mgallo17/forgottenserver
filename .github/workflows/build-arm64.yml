name: Build ARM64 TFS 1.2

on:
  workflow_dispatch:

jobs:
  build-arm64:
    name: Compile TFS 1.2 ARM64 (7.7)
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout branch 1.2
        uses: actions/checkout@v4
        with:
          ref: 1.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libboost-system-dev libboost-filesystem-dev \
            libmysqlclient-dev \
            libluajit-5.1-dev \
            libpugixml-dev libgmp-dev

      - name: Build
        run: |
          MYSQL_INC=$(find /usr/include -name "mysql.h" 2>/dev/null | head -1 | xargs dirname)
          MYSQL_LIB=$(find /usr/lib -name "libmysqlclient*" 2>/dev/null | head -1 | xargs dirname)
          echo "MySQL include: $MYSQL_INC"
          echo "MySQL lib: $MYSQL_LIB"
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
            -DMYSQL_INCLUDE_DIR="$MYSQL_INC" \
            -DMYSQL_LIB_DIR="$MYSQL_LIB" \
            -DLUA_INCLUDE_DIR=/usr/include/luajit-2.1 \
            -DLUA_LIBRARY=/usr/lib/aarch64-linux-gnu/libluajit-5.1.so
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfs12-77-arm64
          path: build/tfs
          retention-days: 30
